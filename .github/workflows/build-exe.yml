name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Check .NET version
      run: dotnet --version
    
    - name: Restore NuGet packages
      run: dotnet restore --verbosity normal
    
    - name: Build Project (Debug)
      run: |
        Write-Host "::group::Build Output"
        dotnet build src/DiskCleaner/DiskCleaner.csproj -c Debug -r win-x64 --verbosity detailed 2>&1 | Tee-Object -Variable buildOutput
        Write-Host "::endgroup::"
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host "::error::Build failed"
          $buildOutput | Select-String "error" | ForEach-Object {
            Write-Host "::error file=.$($_.ToString().Split('(')[0].Replace(' ','')),line=$($_.ToString()),endcolumn=1000::$_"
          }
          exit 1
        }
        Write-Host "Build succeeded"
      shell: pwsh
    
    - name: Publish EXE
      run: |
        Write-Host "::group::Publish Output"
        dotnet publish src/DiskCleaner/DiskCleaner.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:EnableCompressionInSingleFile=true `
          -p:WindowsPackageType=None `
          --verbosity detailed `
          -o build 2>&1 | Tee-Object -Variable publishOutput
        Write-Host "::endgroup::"
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host "::error::Publish failed"
          $publishOutput | Select-String "error" | ForEach-Object {
            $line = $_.ToString()
            if ($line -match ".*\((\d+),(\d+)\): error .*") {
              $file = $line.Split('(')[0].Replace(' ','')
              $lineNum = $matches[1]
              Write-Host "::error file=src/DiskCleaner/$file,line=$lineNum,title=Build Error::$line"
            } else {
              Write-Host "::error::$line"
            }
          }
          exit 1
        }
        Write-Host "Publish succeeded"
      shell: pwsh
    
    - name: List build output
      run: |
        Write-Host "Contents of build directory:"
        Get-ChildItem build -Recurse -File | ForEach-Object { 
          Write-Host "  $($_.FullName) - $($_.Length / 1KB) KB"
        }
      shell: pwsh
    
    - name: Verify EXE exists
      run: |
        if (Test-Path build/DiskCleaner.exe) {
          Write-Host "::notice::Build succeeded - EXE found"
          $exe = Get-Item build/DiskCleaner.exe
          Write-Host "EXE size: $([math]::Round($exe.Length / 1MB, 2)) MB"
        } else {
          Write-Host "::error::Build failed - EXE not found"
          Get-ChildItem build -Recurse
          exit 1
        }
      shell: pwsh
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DiskCleaner-EXE
        path: build/DiskCleaner.exe
        retention-days: 30
    
    - name: Commit to build directory
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add build/*
        git commit -m "🔨 Build ${{ github.sha }} succeeded [skip ci]" || echo "No changes"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: Build-${{ github.run_number }}-${{ github.sha }}
        name: "Build ${{ github.run_number }} - ${{ github.event.head_commit.message }}"
        files: build/DiskCleaner.exe
        generate_release_notes: true
        fail_on_unmatched_files: false
