name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Publish
      run: |
        dotnet publish src/DiskCleaner/DiskCleaner.csproj -c Release -o publish -r win-x64 --self-contained true
        dir publish
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DiskCleaner-EXE
        path: publish/DiskCleaner.exe
        retention-days: 90
    
    - name: Commit to build folder
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        mkdir -p build
        copy publish\DiskCleaner.exe build\
        git add build/*
        git commit -m "[skip ci] Build ${{ github.sha }}" || echo "No changes"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        files: publish/DiskCleaner.exe
        generate_release_notes: true
