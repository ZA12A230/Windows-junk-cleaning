name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Publish
      run: |
        echo "=== Starting Publish ==="
        dotnet --version
        dotnet publish src/DiskCleaner/DiskCleaner.csproj -c Release -o publish -r win-x64 --self-contained true
        echo "=== Publish Complete ==="
        dir publish
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: DiskCleaner
        path: publish/
